apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: kafka-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: confluentinc/cp-kafka:7.5.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - /scripts/create-topics.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: kafka-topic-init
            defaultMode: 493
