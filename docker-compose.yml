version: '3.8'

networks:
  fraud-net:
    driver: bridge

volumes:
  transaction-db-data:
  user-db-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [fraud-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks: [fraud-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # internal
      - "9093:9093"       # external (host access for testing)
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME:       INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        'false'
      KAFKA_LOG_RETENTION_HOURS:              168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    networks: [fraud-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.created  --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.scored   --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.finalised --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.flagged  --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.reviewed --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.reversed --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.dlq      --partitions 3 --replication-factor 1
      echo 'Topics created successfully!'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [fraud-net]
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 3s

  transaction-db:
    image: postgres:15-alpine
    container_name: transaction-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB:       transaction_db
      POSTGRES_USER:     txn_user
      POSTGRES_PASSWORD: txn_password
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txn_user -d transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: transaction-service
    networks: [fraud-net]
    ports:
      - "3001:3001"
      - "9091:9091"
    depends_on:
      transaction-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV:              production
      PORT:                  3001
      SERVICE_NAME:          transaction-service
      LOG_LEVEL:             info
      # DB
      DB_HOST:               transaction-db
      DB_PORT:               5432
      DB_NAME:               transaction_db
      DB_USER:               txn_user
      DB_PASSWORD:           txn_password
      # Kafka
      KAFKA_BROKERS:         kafka:9092
      KAFKA_CLIENT_ID:       transaction-service
      # Redis
      REDIS_HOST:            redis
      REDIS_PORT:            6379
      REDIS_DB:              1
      # JWT (must match API Gateway)
      JWT_SECRET:            super-secret-change-in-prod
    command: >
      sh -c "node src/db/migrate.js && node src/index.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    networks: [fraud-net]
    ports:
      - "3000:3000"
      - "9090:9090"
    depends_on:
      redis:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
    environment:
      NODE_ENV:                     production
      PORT:                         3000
      SERVICE_NAME:                 api-gateway
      LOG_LEVEL:                    info
      JWT_SECRET:                   super-secret-change-in-prod
      JWT_EXPIRES_IN:               24h
      JWT_ISSUER:                   fraud-detection-platform
      REDIS_HOST:                   redis
      REDIS_PORT:                   6379
      REDIS_DB:                     0
      RATE_LIMIT_WINDOW_MS:         60000
      RATE_LIMIT_MAX_REQUESTS:      100
      TRANSACTION_SERVICE_URL:      http://transaction-service:3001
      CIRCUIT_BREAKER_TIMEOUT:      3000
      CIRCUIT_BREAKER_ERROR_THRESHOLD: 50
      CIRCUIT_BREAKER_RESET_TIMEOUT:   30000
      METRICS_ENABLED:              true
      METRICS_PORT:                 9090
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: user_password
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_admin -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    networks: [fraud-net]
    ports:
      - "3002:3002"
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  3002
      SERVICE_NAME:          user-service
      LOG_LEVEL:             info
      # DB
      DB_HOST:               user-db
      DB_PORT:               5432
      DB_NAME:               user_db
      DB_USER:               user_admin
      DB_PASSWORD:           user_password
      # JWT (must match API Gateway)
      JWT_SECRET:            super-secret-change-in-prod
      JWT_EXPIRES_IN:        24h
      JWT_ISSUER:            fraud-detection-platform
      JWT_REFRESH_SECRET:    super-secret-refresh-token
      JWT_REFRESH_EXPIRES_IN: 7d
      # Redis
      REDIS_HOST:            redis
      REDIS_PORT:            6379
      REDIS_DB:              2
      # Security
      BCRYPT_ROUNDS:         12
      LOGIN_MAX_ATTEMPTS:    5
      LOGIN_LOCKOUT_DURATION: 900000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    command: sh -c "npm run migrate && npm start"
    stop_grace_period: 9s

  fraud-detection-service:
      build:
        context: ./fraud-detection-service
        dockerfile: Dockerfile
      container_name: fraud-detection-service
      networks: [fraud-net]
      ports:
        - "3003:3003"
      depends_on:
        kafka:
          condition: service_healthy
        redis:
          condition: service_healthy
      environment:
        NODE_ENV:              production
        PORT:                  3003
        SERVICE_NAME:          fraud-detection-service
        LOG_LEVEL:             info
        # Kafka
        KAFKA_BROKERS:         kafka:9092
        KAFKA_CLIENT_ID:       fraud-detection-service
        KAFKA_GROUP_ID:        fraud-detection-group
        KAFKA_INPUT_TOPIC:     transaction.created
        KAFKA_OUTPUT_TOPIC:    transaction.scored
        KAFKA_DLQ_TOPIC:       transaction.dlq   
        # Redis
        REDIS_HOST:            redis
        REDIS_PORT:            6379
        REDIS_DB:              3
        # ML Scoring Service
        ML_SCORING_SERVICE_URL: http://ml-scoring-service:3004
        ML_SCORING_TIMEOUT:    3000
        # Fraud Rules
        VELOCITY_MAX_AMOUNT_PER_HOUR: 10000
        VELOCITY_MAX_COUNT_PER_HOUR:  10
        VELOCITY_MAX_COUNT_PER_DAY:   50
        HIGH_RISK_COUNTRIES:   NG,RU,CN,PK
        HIGH_AMOUNT_THRESHOLD: 5000
        SUSPICIOUS_AMOUNT_THRESHOLD: 10000
        BIN_BLACKLIST:         123456,654321
      healthcheck:
        test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/api/v1/health/live"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 20s
      restart: unless-stopped