apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-service
spec:
  selector:
    app: fraud-detection-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection-service
  template:
    metadata:
      labels:
        app: fraud-detection-service
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
        - name: wait-for-ml-scoring
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O- http://ml-scoring-service:3004/api/v1/health/ready >/dev/null; do echo waiting for ml-scoring-service; sleep 2; done
        - name: wait-for-topics
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/sh
            - -c
            - |
              until topics="$(kafka-topics --bootstrap-server kafka:9092 --list 2>/dev/null)" &&
                printf '%s\n' "$topics" | grep -q '^transaction.created$' &&
                printf '%s\n' "$topics" | grep -q '^transaction.scored$' &&
                printf '%s\n' "$topics" | grep -q '^transaction.dlq$'
              do
                echo waiting for fraud-detection topics
                sleep 3
              done
      containers:
        - name: fraud-detection-service
          image: fraud-detection-system-fraud-detection-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: OTEL_ENABLED
              value: "false"
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3003"
            - name: SERVICE_NAME
              value: fraud-detection-service
            - name: SERVICE_VERSION
              value: 1.0.0
            - name: LOG_LEVEL
              value: info
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: KAFKA_CLIENT_ID
              value: fraud-detection-service
            - name: KAFKA_GROUP_ID
              value: fraud-detection-group
            - name: KAFKA_INPUT_TOPIC
              value: transaction.created
            - name: KAFKA_OUTPUT_TOPIC
              value: transaction.scored
            - name: KAFKA_DLQ_TOPIC
              value: transaction.dlq
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "3"
            - name: ML_SCORING_SERVICE_URL
              value: http://ml-scoring-service:3004
            - name: ML_SCORING_TIMEOUT
              value: "3000"
            - name: VELOCITY_MAX_AMOUNT_PER_HOUR
              value: "100000"
            - name: VELOCITY_MAX_COUNT_PER_HOUR
              value: "10"
            - name: VELOCITY_MAX_COUNT_PER_DAY
              value: "50"
            - name: HIGH_RISK_COUNTRIES
              value: NG,RU,CN,PK
            - name: HIGH_AMOUNT_THRESHOLD
              value: "5000"
            - name: SUSPICIOUS_AMOUNT_THRESHOLD
              value: "10000"
            - name: BIN_BLACKLIST
              value: 123456,654321
            - name: METRICS_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3003
            initialDelaySeconds: 35
            periodSeconds: 20
