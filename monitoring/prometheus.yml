global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    platform: fraud-detection

rule_files: []

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'transaction-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['transaction-service:3001']

  - job_name: 'ml-scoring-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['ml-scoring-service:3004']

  - job_name: 'decision-engine-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['decision-engine-service:3005']

  - job_name: 'notification-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['notification-service:3006']

  - job_name: 'audit-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['audit-service:3007']