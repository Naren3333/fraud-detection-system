global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    platform: fraud-detection

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'api-gateway'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api-gateway:3000']

  - job_name: 'transaction-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['transaction-service:3001']

  - job_name: 'ml-scoring-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['ml-scoring-service:3004']

  - job_name: 'decision-engine-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['decision-engine-service:3005']

  - job_name: 'notification-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['notification-service:3006']

  - job_name: 'audit-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['audit-service:3007']

  - job_name: 'user-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['user-service:3002']

  - job_name: 'fraud-detection-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['fraud-detection-service:3003']

  - job_name: 'human-verification-service'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['human-verification-service:3010']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: 'otel-spanmetrics'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
