apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
        - name: wait-for-user-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O- http://user-service:3002/api/v1/health/ready >/dev/null; do echo waiting for user-service; sleep 2; done
        - name: wait-for-transaction-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O- http://transaction-service:3001/api/v1/health/ready >/dev/null; do echo waiting for transaction-service; sleep 2; done
        - name: wait-for-decision-engine-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O- http://decision-engine-service:3005/api/v1/health/ready >/dev/null; do echo waiting for decision-engine-service; sleep 2; done
      containers:
        - name: api-gateway
          image: fraud-detection-system-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: OTEL_ENABLED
              value: "false"
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: SERVICE_NAME
              value: api-gateway
            - name: LOG_LEVEL
              value: info
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: 24h
            - name: JWT_ISSUER
              value: fraud-detection-platform
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: RATE_LIMIT_MAX_REQUESTS
              value: "100"
            - name: TXN_RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: TXN_RATE_LIMIT_MAX_PER_CUSTOMER
              value: "30"
            - name: USER_SERVICE_URL
              value: http://user-service:3002
            - name: TRANSACTION_SERVICE_URL
              value: http://transaction-service:3001
            - name: DECISION_ENGINE_SERVICE_URL
              value: http://decision-engine-service:3005
            - name: CIRCUIT_BREAKER_TIMEOUT
              value: "3000"
            - name: CIRCUIT_BREAKER_ERROR_THRESHOLD
              value: "50"
            - name: CIRCUIT_BREAKER_RESET_TIMEOUT
              value: "30000"
            - name: PROXY_TIMEOUT
              value: "30000"
            - name: METRICS_ENABLED
              value: "false"
            - name: ENABLE_AUTH_ROUTES
              value: "true"
            - name: ENABLE_TRANSACTION_ROUTES
              value: "true"
            - name: ENABLE_DECISION_ROUTES
              value: "true"
            - name: ENABLE_AUDIT_ROUTES
              value: "false"
            - name: ENABLE_ANALYTICS_ROUTES
              value: "false"
            - name: ENABLE_HUMAN_VERIFICATION_ROUTES
              value: "false"
            - name: ENABLE_APPEAL_ROUTES
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3000
            initialDelaySeconds: 35
            periodSeconds: 20
