apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: wait-for-user-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z user-db 5432; do echo waiting for user-db; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: user-service
          image: fraud-detection-system-user-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - npm run migrate && npm start
          ports:
            - containerPort: 3002
              name: http
          env:
            - name: OTEL_ENABLED
              value: "false"
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3002"
            - name: SERVICE_NAME
              value: user-service
            - name: LOG_LEVEL
              value: info
            - name: DB_HOST
              value: user-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: user_db
            - name: DB_USER
              value: user_admin
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: USER_DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: 24h
            - name: JWT_ISSUER
              value: fraud-detection-platform
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_REFRESH_SECRET
            - name: JWT_REFRESH_EXPIRES_IN
              value: 7d
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "2"
            - name: BCRYPT_ROUNDS
              value: "12"
            - name: LOGIN_MAX_ATTEMPTS
              value: "5"
            - name: LOGIN_LOCKOUT_DURATION
              value: "900000"
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
