<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Verification Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Human Verification Dashboard</h1>
  </header>

  <main>
    <section id="pending-reviews-section">
      <h2>Pending Reviews</h2>
      <span id="status"></span>
      <button id="refresh-btn">Refresh</button>
      <table id="pending-reviews-table">
        <thead>
          <tr>
            <th>Transaction ID</th>
            <th>Amount</th>
            <th>Customer</th>
            <th>Reason</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Rows will be injected by review.js -->
        </tbody>
      </table>
    </section>
  </main>

  <script src="review.js"></script>
</body>
</html>
