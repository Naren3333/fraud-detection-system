networks:
  fraud-net:
    driver: bridge


volumes:
  transaction-db-data:
  user-db-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  decision-db-data:
  human-review-db-data:
  appeal-db-data:
  audit-db-data:
  prometheus-data:
  grafana-data:

x-otel-env: &otel-env
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAMESPACE: fraud-detection-platform
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "1.0"
  OTEL_PROPAGATORS: tracecontext,baggage

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [fraud-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks: [fraud-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${KAFKA_INTERNAL_HOST_PORT:-9092}:9092"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${KAFKA_EXTERNAL_HOST_PORT:-9093}:9093"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             INTERNAL://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_ADVERTISED_HOST:-localhost}:${KAFKA_EXTERNAL_HOST_PORT:-9093}
      KAFKA_INTER_BROKER_LISTENER_NAME:       INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:    1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        'false'
      KAFKA_LOG_RETENTION_HOURS:              168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    networks: [fraud-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.created  --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.scored   --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.finalised --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.flagged  --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.reviewed --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic appeal.created --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic appeal.resolved --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.reversed --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic transaction.dlq      --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.dlq --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic appeal.dlq --partitions 3 --replication-factor 1
      echo 'Topics created successfully!'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [fraud-net]
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 3s

  transaction-db:
    image: postgres:15-alpine
    container_name: transaction-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB:       ${TRANSACTION_DB_NAME:-transaction_db}
      POSTGRES_USER:     ${TRANSACTION_DB_USER:-txn_user}
      POSTGRES_PASSWORD: ${TRANSACTION_DB_PASSWORD}
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRANSACTION_DB_USER:-txn_user} -d ${TRANSACTION_DB_NAME:-transaction_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: transaction-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${TRANSACTION_SERVICE_HOST_PORT:-3001}:3001"
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${TRANSACTION_METRICS_HOST_PORT:-9091}:9091"
    depends_on:
      transaction-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: transaction-service
      NODE_ENV:              production
      PORT:                  3001
      SERVICE_NAME:          transaction-service
      LOG_LEVEL:             info
      # DB
      DB_HOST:               transaction-db
      DB_PORT:               5432
      DB_NAME:               ${TRANSACTION_DB_NAME:-transaction_db}
      DB_USER:               ${TRANSACTION_DB_USER:-txn_user}
      DB_PASSWORD:           ${TRANSACTION_DB_PASSWORD}
      # Kafka
      KAFKA_BROKERS:         kafka:9092
      KAFKA_CLIENT_ID:       transaction-service
      KAFKA_TOPIC_TRANSACTION_FINALISED: transaction.finalised
      KAFKA_TOPIC_TRANSACTION_FLAGGED: transaction.flagged
      KAFKA_TOPIC_TRANSACTION_REVIEWED: transaction.reviewed
      KAFKA_TOPIC_APPEAL_RESOLVED: appeal.resolved
      # Redis
      REDIS_HOST:            redis
      REDIS_PORT:            6379
      REDIS_DB:              1
      # JWT (must match API Gateway)
      JWT_SECRET:            ${PLATFORM_JWT_SECRET}
    command: >
      sh -c "node src/db/migrate.js && node src/index.js"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    networks: [fraud-net]
    ports:
      - "${GATEWAY_BIND_HOST:-0.0.0.0}:${API_GATEWAY_HOST_PORT:-3000}:3000"
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${API_GATEWAY_METRICS_HOST_PORT:-9090}:9090"
    depends_on:
      redis:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      human-verification-service:
        condition: service_healthy
      appeal-service:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: api-gateway
      NODE_ENV:                     production
      PORT:                         3000
      SERVICE_NAME:                 api-gateway
      LOG_LEVEL:                    info
      JWT_SECRET:                   ${PLATFORM_JWT_SECRET}
      JWT_EXPIRES_IN:               24h
      JWT_ISSUER:                   fraud-detection-platform
      REDIS_HOST:                   redis
      REDIS_PORT:                   6379
      REDIS_DB:                     0
      RATE_LIMIT_WINDOW_MS:         60000
      RATE_LIMIT_MAX_REQUESTS:      100
      TRANSACTION_SERVICE_URL:      http://transaction-service:3001
      HUMAN_VERIFICATION_SERVICE_URL: http://human-verification-service:3010
      APPEAL_SERVICE_URL:           http://appeal-service:3011
      CIRCUIT_BREAKER_TIMEOUT:      3000
      CIRCUIT_BREAKER_ERROR_THRESHOLD: 50
      CIRCUIT_BREAKER_RESET_TIMEOUT:   30000
      METRICS_ENABLED:              true
      METRICS_PORT:                 9090
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-user_db}
      POSTGRES_USER: ${USER_DB_USER:-user_admin}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-user_admin} -d ${USER_DB_NAME:-user_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${USER_SERVICE_HOST_PORT:-3002}:3002"
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: user-service
      NODE_ENV:              production
      PORT:                  3002
      SERVICE_NAME:          user-service
      LOG_LEVEL:             info
      # DB
      DB_HOST:               user-db
      DB_PORT:               5432
      DB_NAME:               ${USER_DB_NAME:-user_db}
      DB_USER:               ${USER_DB_USER:-user_admin}
      DB_PASSWORD:           ${USER_DB_PASSWORD}
      # JWT (must match API Gateway)
      JWT_SECRET:            ${PLATFORM_JWT_SECRET}
      JWT_EXPIRES_IN:        24h
      JWT_ISSUER:            fraud-detection-platform
      JWT_REFRESH_SECRET:    ${PLATFORM_JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
      # Redis
      REDIS_HOST:            redis
      REDIS_PORT:            6379
      REDIS_DB:              2
      # Security
      BCRYPT_ROUNDS:         12
      LOGIN_MAX_ATTEMPTS:    5
      LOGIN_LOCKOUT_DURATION: 900000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    command: sh -c "npm run migrate && npm start"
    stop_grace_period: 9s

  fraud-detection-service:
      build:
        context: ./fraud-detection-service
        dockerfile: Dockerfile
      container_name: fraud-detection-service
      networks: [fraud-net]
      ports:
        - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${FRAUD_DETECTION_SERVICE_HOST_PORT:-3003}:3003"
      depends_on:
        kafka:
          condition: service_healthy
        redis:
          condition: service_healthy
      environment:
        <<: *otel-env
        OTEL_SERVICE_NAME: fraud-detection-service
        NODE_ENV:              production
        PORT:                  3003
        SERVICE_NAME:          fraud-detection-service
        LOG_LEVEL:             info
        # Kafka
        KAFKA_BROKERS:         kafka:9092
        KAFKA_CLIENT_ID:       fraud-detection-service
        KAFKA_GROUP_ID:        fraud-detection-group
        KAFKA_INPUT_TOPIC:     transaction.created
        KAFKA_OUTPUT_TOPIC:    transaction.scored
        KAFKA_DLQ_TOPIC:       transaction.dlq   
        # Redis
        REDIS_HOST:            redis
        REDIS_PORT:            6379
        REDIS_DB:              3
        # ML Scoring Service
        ML_SCORING_SERVICE_URL: http://ml-scoring-service:3004
        ML_SCORING_TIMEOUT:    3000
        # Fraud Rules
        VELOCITY_MAX_AMOUNT_PER_HOUR: 100000
        VELOCITY_MAX_COUNT_PER_HOUR:  10
        VELOCITY_MAX_COUNT_PER_DAY:   50
        HIGH_RISK_COUNTRIES:   NG,RU,CN,PK
        HIGH_AMOUNT_THRESHOLD: 5000
        SUSPICIOUS_AMOUNT_THRESHOLD: 10000
        BIN_BLACKLIST:         123456,654321
      healthcheck:
        test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/api/v1/health/live"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 20s
      restart: unless-stopped

  ml-scoring-service:
    build:
      context: ./ml-scoring-service
      dockerfile: Dockerfile
    container_name: ml-scoring-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${ML_SCORING_SERVICE_HOST_PORT:-3004}:3004"
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${ML_SCORING_METRICS_HOST_PORT:-9094}:9094"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: ml-scoring-service
      NODE_ENV:              production
      PORT:                  3004
      SERVICE_NAME:          ml-scoring-service
      SERVICE_VERSION:       2.0.0
      LOG_LEVEL:             info
      # Redis
      REDIS_HOST:            redis
      REDIS_PORT:            6379
      REDIS_DB:              4
      # Model
      MODEL_VERSION:         xgboost-v2.1
      MODEL_CACHE_TTL:       3600
      MODEL_WARM_CACHE:      true
      # Features
      FEATURE_AMOUNT_BINS:   5,10,50,100,500,1000,5000,10000
      FEATURE_HOUR_BINS:     0,6,12,18,24
      FEATURE_VELOCITY_DECAY: 0.5
      # Scoring
      CONFIDENCE_THRESHOLD:  0.6
      MIN_FEATURES_REQUIRED: 8
      # Performance
      REQUEST_TIMEOUT_MS:    2500
      MAX_BATCH_SIZE:        100
      ENABLE_MODEL_WARMING:  true
      # Metrics
      METRICS_ENABLED:       true
      METRICS_PORT:          9094
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# Decision Database
  decision-db:
    image: postgres:15-alpine
    container_name: decision-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB:       ${DECISION_DB_NAME:-decision_db}
      POSTGRES_USER:     ${DECISION_DB_USER:-decision_admin}
      POSTGRES_PASSWORD: ${DECISION_DB_PASSWORD}
    volumes:
      - decision-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DECISION_DB_USER:-decision_admin} -d ${DECISION_DB_NAME:-decision_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Decision Engine Service
  decision-engine-service:
    build:
      context: ./decision-engine-service
      dockerfile: Dockerfile
    container_name: decision-engine-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${DECISION_ENGINE_SERVICE_HOST_PORT:-3005}:3005"
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${DECISION_ENGINE_METRICS_HOST_PORT:-9095}:9095"
    depends_on:
      decision-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: decision-engine-service
      NODE_ENV:              production
      PORT:                  3005
      SERVICE_NAME:          decision-engine-service
      SERVICE_VERSION:       1.0.0
      LOG_LEVEL:             info
      # Database
      DB_HOST:               decision-db
      DB_PORT:               5432
      DB_NAME:               ${DECISION_DB_NAME:-decision_db}
      DB_USER:               ${DECISION_DB_USER:-decision_admin}
      DB_PASSWORD:           ${DECISION_DB_PASSWORD}
      DB_MAX_CONNECTIONS:    20
      # Kafka
      KAFKA_BROKERS:         kafka:9092
      KAFKA_CLIENT_ID:       decision-engine-service
      KAFKA_GROUP_ID:        decision-engine-group
      KAFKA_INPUT_TOPIC:     transaction.scored
      KAFKA_OUTPUT_TOPIC_APPROVED: transaction.finalised
      KAFKA_OUTPUT_TOPIC_FLAGGED:  transaction.flagged
      KAFKA_DLQ_TOPIC:       transaction.decision.dlq
      # Decision Thresholds
      THRESHOLD_APPROVE_MAX: 49
      THRESHOLD_FLAG_MIN:    50
      THRESHOLD_FLAG_MAX:    79
      THRESHOLD_DECLINE_MIN: 80
      # Overrides
      THRESHOLD_RULES_FLAGGED_AUTO_DECLINE: false
      THRESHOLD_CERTAINTY_AUTO_DECLINE_ENABLED: true
      THRESHOLD_CERTAINTY_DECLINE_MIN_SCORE: 70
      THRESHOLD_CERTAINTY_DECLINE_MIN_CONFIDENCE: 0.90
      THRESHOLD_HIGH_CONFIDENCE_APPROVE:    0.95
      THRESHOLD_LOW_CONFIDENCE_FLAG:        0.60
      THRESHOLD_HIGH_VALUE_AMOUNT:          10000
      THRESHOLD_HIGH_VALUE_AUTO_FLAG:       true
      # Business Rules
      AUTO_APPROVE_WHITELIST_CUSTOMERS: ""
      AUTO_DECLINE_BLACKLIST_CUSTOMERS: ""
      REQUIRE_MANUAL_REVIEW_COUNTRIES:  NG,RU,CN,PK
      # Metrics
      METRICS_ENABLED:       true
      METRICS_PORT:          9095
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: sh -c "npm run migrate && npm start"
  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${NOTIFICATION_SERVICE_HOST_PORT:-3006}:3006"
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${NOTIFICATION_METRICS_HOST_PORT:-9096}:9096"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: notification-service
      NODE_ENV:              production
      PORT:                  3006
      SERVICE_NAME:          notification-service
      SERVICE_VERSION:       1.0.0
      LOG_LEVEL:             info
      # Kafka
      KAFKA_BROKERS:         kafka:9092
      KAFKA_CLIENT_ID:       notification-service
      KAFKA_GROUP_ID:        notification-group
      KAFKA_INPUT_TOPIC_FINALISED: transaction.finalised
      KAFKA_INPUT_TOPIC_FLAGGED:   transaction.flagged
      KAFKA_DLQ_TOPIC:       notification.dlq
      # Retry
      RETRY_MAX_ATTEMPTS:    3
      RETRY_INITIAL_DELAY_MS: 1000
      RETRY_BACKOFF_MULTIPLIER: 2
      RETRY_MAX_DELAY_MS:    10000
      # Email (Mock mode - logs only)
      EMAIL_ENABLED:         true
      EMAIL_PROVIDER:        mock
      EMAIL_FROM_ADDRESS:    noreply@frauddetection.com
      EMAIL_FROM_NAME:       Fraud Detection System
      # SMS (Mock mode - logs only)
      SMS_ENABLED:           true
      SMS_PROVIDER:          mock
      # Notification Rules
      NOTIFY_ON_APPROVED:    false
      NOTIFY_ON_DECLINED:    true
      NOTIFY_ON_FLAGGED:     true
      DECLINED_NOTIFY_CUSTOMER_EMAIL:  true
      DECLINED_NOTIFY_CUSTOMER_SMS:    true
      DECLINED_NOTIFY_FRAUD_TEAM_EMAIL: true
      FLAGGED_NOTIFY_FRAUD_TEAM_EMAIL:  true
      FLAGGED_NOTIFY_FRAUD_TEAM_SMS:    false
      # Rate Limiting
      RATE_LIMIT_EMAIL_PER_MINUTE: 60
      RATE_LIMIT_SMS_PER_MINUTE:   30
      # Metrics
      METRICS_ENABLED:       true
      METRICS_PORT:          9096
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3006/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Human Review Database
  human-review-db:
    image: postgres:15-alpine
    container_name: human-review-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB:       ${HUMAN_REVIEW_DB_NAME:-human_review_db}
      POSTGRES_USER:     ${HUMAN_REVIEW_DB_USER:-review_admin}
      POSTGRES_PASSWORD: ${HUMAN_REVIEW_DB_PASSWORD}
    volumes:
      - human-review-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HUMAN_REVIEW_DB_USER:-review_admin} -d ${HUMAN_REVIEW_DB_NAME:-human_review_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Human Verification Service
  human-verification-service:
    build:
      context: ./human-verification-service
      dockerfile: Dockerfile
    container_name: human-verification-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${HUMAN_VERIFICATION_SERVICE_HOST_PORT:-3010}:3010"
    depends_on:
      human-review-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: human-verification-service
      NODE_ENV:              production
      PORT:                  3010
      SERVICE_NAME:          human-verification-service
      SERVICE_VERSION:       1.0.0
      LOG_LEVEL:             info
      # Database
      DB_HOST:               human-review-db
      DB_PORT:               5432
      DB_NAME:               ${HUMAN_REVIEW_DB_NAME:-human_review_db}
      DB_USER:               ${HUMAN_REVIEW_DB_USER:-review_admin}
      DB_PASSWORD:           ${HUMAN_REVIEW_DB_PASSWORD}
      # Kafka
      KAFKA_BROKERS:         kafka:9092
      KAFKA_CLIENT_ID:       human-verification-service
      KAFKA_GROUP_ID:        human-verification-group
      KAFKA_INPUT_TOPIC_FLAGGED: transaction.flagged
      KAFKA_OUTPUT_TOPIC_REVIEWED: transaction.reviewed
      KAFKA_DLQ_TOPIC:       transaction.review.dlq
      APPEAL_SERVICE_URL:    http://appeal-service:3011
      APPEAL_SERVICE_TIMEOUT_MS: 4000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3010/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: sh -c "npm run migrate && npm start"

  # Analytics Service 
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    networks: [fraud-net]
    ports:
      - "${ANALYTICS_BIND_HOST:-0.0.0.0}:${ANALYTICS_SERVICE_HOST_PORT:-3008}:3008"
    depends_on:
      decision-db:
        condition: service_healthy
      appeal-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: analytics-service
      NODE_ENV:              production
      PORT:                  3008
      SERVICE_NAME:          analytics-service
      SERVICE_VERSION:       1.0.0
      LOG_LEVEL:             info
      # Database (read-only access to decision DB)
      DB_HOST:               decision-db
      DB_PORT:               5432
      DB_NAME:               ${DECISION_DB_NAME:-decision_db}
      DB_USER:               ${DECISION_DB_USER:-decision_admin}
      DB_PASSWORD:           ${DECISION_DB_PASSWORD}
      DB_MAX_CONNECTIONS:    10
      # Appeal DB (read-only)
      APPEAL_DB_ENABLED:     true
      APPEAL_DB_HOST:        appeal-db
      APPEAL_DB_PORT:        5432
      APPEAL_DB_NAME:        ${APPEAL_DB_NAME:-appeal_db}
      APPEAL_DB_USER:        ${APPEAL_DB_USER:-appeal_admin}
      APPEAL_DB_PASSWORD:    ${APPEAL_DB_PASSWORD}
      APPEAL_DB_MAX_CONNECTIONS: 10
      # Redis (time-series metrics)
      REDIS_HOST:            redis
      REDIS_PORT:            6379
      REDIS_DB:              5
      # Analytics
      METRICS_RETENTION_HOURS: 168
      METRICS_AGGREGATION_INTERVAL_SECONDS: 60
      ENABLE_REAL_TIME_UPDATES: true
      # WebSocket
      WS_ENABLED:            true
      WS_HEARTBEAT_INTERVAL: 30000
      # Kafka (optional, for real-time streaming)
      KAFKA_ENABLE_CONSUMER: false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3008/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Audit Database
  audit-db:
    image: postgres:15-alpine
    container_name: audit-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB:       ${AUDIT_DB_NAME:-audit_db}
      POSTGRES_USER:     ${AUDIT_DB_USER:-audit_admin}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASSWORD}
    volumes:
      - audit-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUDIT_DB_USER:-audit_admin} -d ${AUDIT_DB_NAME:-audit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Audit Service
  audit-service:
    build:
      context: ./audit-service
      dockerfile: Dockerfile
    container_name: audit-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${AUDIT_SERVICE_HOST_PORT:-3007}:3007"
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${AUDIT_METRICS_HOST_PORT:-9097}:9097"
    depends_on:
      audit-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: audit-service
      NODE_ENV:              production
      PORT:                  3007
      SERVICE_NAME:          audit-service
      SERVICE_VERSION:       1.0.0
      LOG_LEVEL:             info
      # Database
      DB_HOST:               audit-db
      DB_PORT:               5432
      DB_NAME:               ${AUDIT_DB_NAME:-audit_db}
      DB_USER:               ${AUDIT_DB_USER:-audit_admin}
      DB_PASSWORD:           ${AUDIT_DB_PASSWORD}
      DB_MAX_CONNECTIONS:    20
      # Kafka (subscribe to ALL topics)
      KAFKA_BROKERS:         kafka:9092
      KAFKA_CLIENT_ID:       audit-service
      KAFKA_GROUP_ID:        audit-group
      KAFKA_TOPICS:          transaction.created,transaction.scored,transaction.finalised,transaction.flagged,transaction.reviewed,appeal.created,appeal.resolved,transaction.decision.dlq,notification.dlq,appeal.dlq
      # Audit Configuration
      ENABLE_HASH_VERIFICATION: true
      AUDIT_RETENTION_DAYS:  2555
      ENABLE_CHAIN_VALIDATION: true
      # Metrics
      METRICS_ENABLED:       true
      METRICS_PORT:          9097
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3007/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: sh -c "npm run migrate && npm start"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: otel-collector
    networks: [fraud-net]
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${OTEL_HTTP_HOST_PORT:-4318}:4318"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${OTEL_HEALTH_HOST_PORT:-13133}:13133"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${OTEL_METRICS_HOST_PORT:-8889}:8889"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Appeal Database
  appeal-db:
    image: postgres:15-alpine
    container_name: appeal-db
    networks: [fraud-net]
    environment:
      POSTGRES_DB:       ${APPEAL_DB_NAME:-appeal_db}
      POSTGRES_USER:     ${APPEAL_DB_USER:-appeal_admin}
      POSTGRES_PASSWORD: ${APPEAL_DB_PASSWORD}
    volumes:
      - appeal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APPEAL_DB_USER:-appeal_admin} -d ${APPEAL_DB_NAME:-appeal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Appeal Service
  appeal-service:
    build:
      context: ./appeal-service
      dockerfile: Dockerfile
    container_name: appeal-service
    networks: [fraud-net]
    ports:
      - "${INTERNAL_SERVICE_BIND_HOST:-127.0.0.1}:${APPEAL_SERVICE_HOST_PORT:-3011}:3011"
    depends_on:
      appeal-db:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: appeal-service
      NODE_ENV:              production
      PORT:                  3011
      SERVICE_NAME:          appeal-service
      SERVICE_VERSION:       1.0.0
      LOG_LEVEL:             info
      # Database
      DB_HOST:               appeal-db
      DB_PORT:               5432
      DB_NAME:               ${APPEAL_DB_NAME:-appeal_db}
      DB_USER:               ${APPEAL_DB_USER:-appeal_admin}
      DB_PASSWORD:           ${APPEAL_DB_PASSWORD}
      DB_MAX_CONNECTIONS:    20
      # Dependencies
      TRANSACTION_SERVICE_URL: http://transaction-service:3001
      # Kafka
      KAFKA_BROKERS:         kafka:9092
      KAFKA_CLIENT_ID:       appeal-service
      KAFKA_OUTPUT_TOPIC_APPEAL_CREATED: appeal.created
      KAFKA_OUTPUT_TOPIC_APPEAL_RESOLVED: appeal.resolved
      KAFKA_DLQ_TOPIC:       appeal.dlq
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3011/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: sh -c "npm run migrate && npm start"

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.14.0
    container_name: jaeger
    networks: [fraud-net]
    ports:
      - "${OBSERVABILITY_BIND_HOST:-0.0.0.0}:${JAEGER_HOST_PORT:-16686}:16686"
    command:
      - "--set=extensions.jaeger_query.ui.config_file=/etc/jaeger/ui-config.json"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.endpoint=http://prometheus:9090"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.normalize_calls=true"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.normalize_duration=true"
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.metric_namespace="
      - "--set=extensions.jaeger_storage.metric_backends.prometheus_backend.prometheus.latency_unit=ms"
      - "--set=extensions.jaeger_query.storage.metrics=prometheus_backend"
    volumes:
      - ./monitoring/jaeger/ui-config.json:/etc/jaeger/ui-config.json:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    networks: [fraud-net]
    ports:
      - "${OBSERVABILITY_BIND_HOST:-0.0.0.0}:${PROMETHEUS_HOST_PORT:-9099}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    networks: [fraud-net]
    ports:
      - "${OBSERVABILITY_BIND_HOST:-0.0.0.0}:${GRAFANA_HOST_PORT:-3009}:3009"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_PATHS_CONFIG: /etc/grafana/grafana.ini
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3009/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
